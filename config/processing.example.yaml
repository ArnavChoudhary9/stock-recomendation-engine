features:
  sma_periods: [20, 50, 200]
  ema_periods: [12, 26]
  rsi_period: 14
  atr_period: 14
  volatility_period: 20
  momentum_periods: [5, 10, 20]
  volume_avg_period: 20
  # MACD
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  # Bollinger Bands
  bollinger_period: 20
  bollinger_std_dev: 2.0

scoring:
  # Weights are normalised by their sum, so they don't have to add to 1.0.
  # The two new weights default to 0 — bump them (and rebalance the rest) to
  # let MACD / Bollinger influence the composite score.
  weights:
    moving_average: 0.25
    momentum: 0.20
    volume: 0.15
    volatility: 0.10
    fundamental: 0.20
    support_resistance: 0.10
    trend_following: 0.00      # MACD sub-score
    mean_reversion: 0.00       # Bollinger sub-score

signals:
  rsi_overbought: 70
  rsi_oversold: 30
  volume_spike_multiplier: 2.0
  near_high_low_pct: 0.05
  crossover_lookback_days: 5
  ma_slope_period: 10
  ma_slope_flat_threshold: 0.005
  # MACD + Bollinger thresholds
  macd_crossover_lookback_days: 5
  bollinger_squeeze_threshold: 0.04    # bandwidth below this = squeeze
  bollinger_breakout_epsilon: 0.001    # tolerance when comparing price to band edge
